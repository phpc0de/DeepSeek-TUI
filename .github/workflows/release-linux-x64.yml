name: release-linux-x64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (for example: v0.9.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libdbus-1-dev

      - name: Build deepseek linux x64
        run: cargo build --release --bin deepseek --target x86_64-unknown-linux-gnu

      - name: Build deepseek-tui linux x64
        run: cargo build --release -p deepseek-tui --bin deepseek-tui --target x86_64-unknown-linux-gnu

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/deepseek dist/deepseek-linux-x64
          cp target/x86_64-unknown-linux-gnu/release/deepseek-tui dist/deepseek-tui-linux-x64
          chmod +x dist/deepseek-linux-x64 dist/deepseek-tui-linux-x64

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-binaries
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            dist/deepseek-linux-x64
            dist/deepseek-tui-linux-x64

      - name: Log in to GHCR (PAT)
        if: ${{ secrets.GHCR_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Log in to GHCR (GITHUB_TOKEN fallback)
        if: ${{ secrets.GHCR_TOKEN == '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tui
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            TUI_BINARY=dist/deepseek-tui-linux-x64
