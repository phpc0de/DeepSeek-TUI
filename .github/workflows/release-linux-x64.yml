name: release-linux-windows-x64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (for example: v0.9.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            deepseek_name: deepseek-linux-x64
            tui_name: deepseek-tui-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            deepseek_name: deepseek-win-x64.exe
            tui_name: deepseek-tui-win-x64.exe

    runs-on: ${{ matrix.os }}
    env:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libdbus-1-dev

      - name: Build deepseek x64
        run: cargo build --release --bin deepseek --target ${{ matrix.target }}

      - name: Build deepseek-tui x64
        run: cargo build --release -p deepseek-tui --bin deepseek-tui --target ${{ matrix.target }}

      - name: Prepare Linux artifacts
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/deepseek dist/${{ matrix.deepseek_name }}
          cp target/${{ matrix.target }}/release/deepseek-tui dist/${{ matrix.tui_name }}
          chmod +x dist/${{ matrix.deepseek_name }} dist/${{ matrix.tui_name }}

      - name: Prepare Windows artifacts
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/deepseek.exe" "dist/${{ matrix.deepseek_name }}"
          Copy-Item "target/${{ matrix.target }}/release/deepseek-tui.exe" "dist/${{ matrix.tui_name }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-x64-binaries
          path: dist/*

      - name: Create GitHub Release
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            dist/deepseek-linux-x64
            dist/deepseek-tui-linux-x64

      - name: Upload Windows release assets
        if: ${{ matrix.os == 'windows-latest' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          files: |
            dist/deepseek-win-x64.exe
            dist/deepseek-tui-win-x64.exe

      - name: Log in to GHCR (PAT)
        if: ${{ matrix.os == 'ubuntu-latest' && env.GHCR_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME != '' && env.GHCR_USERNAME || github.repository_owner }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Log in to GHCR (GITHUB_TOKEN fallback)
        if: ${{ matrix.os == 'ubuntu-latest' && env.GHCR_TOKEN == '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GHCR auth context
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          echo "GHCR user: ${{ env.GHCR_USERNAME != '' && env.GHCR_USERNAME || github.repository_owner }}"
          echo "Image target: ghcr.io/${{ github.repository }}"

      - name: Extract Docker metadata
        if: ${{ matrix.os == 'ubuntu-latest' }}
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tui
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            TUI_BINARY=dist/deepseek-tui-linux-x64
